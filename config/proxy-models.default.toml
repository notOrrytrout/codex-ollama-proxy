# proxy-models.toml — drives use-ollama-via-proxy.sh routing + proxy.js per-request
# auto-rewrite of the `model` field.
#
# text_model  : default model Codex runs (good orchestrator, no vision needed).
# image_model : model the proxy rewrites the request to when a message contains
#               an input_image content block. Must be vision-capable in the catalog
#               (ollama-launch-models.json input_modalities includes "image").
#
# Both slugs must exist in ollama-launch-models.json and be available on the
# upstream Responses API server.

text_model  = "glm-5.2:cloud"
image_model = "kimi-k2.7-code:cloud"

# Base URL for the upstream Responses API server. The proxy appends
# /responses for model turns and maps /v1/models to /models under this base.
# Default targets Ollama's local OpenAI-compatible API.
upstream_url = "http://127.0.0.1:11434/v1"

# Optional bearer token for upstream Responses API servers that require auth.
# Leave empty for local Ollama.
upstream_api_key = ""

# When true, the shape proxy inspects the active user turn and its subsequent
# tool outputs for an image block, then rewrites body.model to image_model.
# Images replayed only as part of older conversation history are ignored.
# When false, the proxy passes model through unchanged (manual switching only).
auto_route_image = true

# Codex can replay identical developer instruction blocks multiple times in a
# single Responses request. Keep the newest copy of byte-identical input_text
# blocks at or above this size. User and assistant messages are never filtered.
# Off by default: stripping context mid-turn can break provider implicit
# caching. Opt in per-run with `serve --dedupe-large-input` (or env
# PROXY_DEDUPE_LARGE_INPUT=1), or set this to true to enable it persistently.
dedupe_large_input = false
duplicate_input_min_chars = 512

# When true, supported inline images up to 20 MiB are saved below the proxy-owned
# ~/.codex/attachments/ollama-shape-proxy-inline-images directory. Historical
# images are replaced with path references, while active image-model turns keep
# their current pixels. This applies only to loopback upstreams; remote upstreams
# keep images inline and never receive local paths. Requests without a stable
# session identifier are left unchanged to prevent cache sharing between sessions.
persist_inline_images = true

# Session caches unused for this many days are removed lazily. Set to 0 to keep
# cached images indefinitely.
inline_image_retention_days = 30

# When true, proxy.js logs full tool definitions and model/tool call items to
# proxy.log. Useful for debugging Ollama shape translation. May include prompts,
# tool arguments, shell commands, search queries, and patch contents.
verbose_tools = false

# When true, proxy.js writes the exact translated /v1/responses JSON body sent
# to upstream Ollama into upstream-bodies.jsonl. This can include prompts, tool
# arguments, file paths, and other sensitive context; keep it on only while
# debugging.
log_upstream_body = false

# When true, the shape proxy injects a synthetic `find_skill` function tool into
# every /v1/responses request and self-fulfills it locally: the model can call
# find_skill{query} to locate enabled Codex skills (plugin + non-plugin) by
# skill name, plugin name, and description (plugin-name matches rank highest),
# and gets back the top 5 (configurable via the `limit` arg) matching SKILL.md
# paths. web_search is not affected by this flag.
#
# Startup makes a filesystem index available immediately and refreshes the
# exact Codex app-server inventory asynchronously. find_skill calls are
# fulfilled by the proxy; other streamed output remains live when
# stream_proxy_loop is enabled. Env: PROXY_FIND_SKILL=1 / =0.
enable_find_skill = true

# When true, streamed /v1/responses turns are piped to the Codex app live
# (text / reasoning / tool calls appear as they're generated) instead of being
# buffered and flushed all at once. web_search / find_skill calls are still
# self-fulfilled by the proxy, but they are re-emitted to the app as completed
# call + output items so they show up in the UI while the proxy works, instead
# of the UI going silent ("feeling stuck"). Set to false to restore the old
# collapse-to-final-response behavior. Env: PROXY_STREAM_LOOP=1 / =0.
stream_proxy_loop = true

# ── Image Generation (imagine.js) ───────────────────────────────────────────
# When true, the proxy injects a synthetic `generate_image` function tool into
# every /v1/responses request. The model can call generate_image{prompt,
# inputImagePath, aspectRatio, quality} and the proxy fulfills it locally by
# calling the configured image backend (Gemini, OpenAI, or Ollama). The image
# is saved to a temp file and the path is returned to the model as tool output.
# Works the same way as web_search and find_skill — no MCP server or separate
# process needed. Set to false to disable image generation entirely.
imagine_enabled = false

# Which image generation backend to use:
#   "gemini" — Google Gemini (Nano Banana 2 / Pro). Requires GEMINI_API_KEY.
#   "openai"  — OpenAI GPT Image 2. Requires OPENAI_API_KEY.
#   "ollama"  — Ollama's native /api/generate image endpoint.
imagine_service = "gemini"

# Default model for the selected backend. Must match the provider — do not mix
# models between services. Ollama requires an explicit model. If empty, Gemini
# and OpenAI use their provider defaults.
# Update together with imagine_service: --service and --model must always be set as a pair.
imagine_model = ""

# Base URL for the Ollama image backend. This is independent of upstream_url,
# so image generation can remain local while text requests use OpenRouter or
# another supported Responses provider. A trailing /v1 is accepted and removed
# before calling /api/generate. Ignored by Gemini and OpenAI.
imagine_base_url = "http://127.0.0.1:11434"

# API key for the selected backend. Gemini and OpenAI fall back to their
# corresponding environment variables. Ollama sends a bearer token only when
# this value is configured; local Ollama normally leaves it empty.
imagine_api_key = ""

# Quality preset: "fast" (quick drafts), "balanced" (medium), "quality" (best).
# Maps to Gemini/OpenAI settings. Ollama currently uses the model's defaults.
imagine_quality = "fast"

# When true, the proxy enhances the prompt before sending it to the image
# backend by calling the Ollama text model with a Subject-Context-Style system
# prompt. For image editing (inputImagePath provided), the enhancement includes
# instructions to preserve the original image's characteristics. This adds one
# extra round-trip to the Ollama model but produces richer, more detailed
# prompts. Set to false to pass the raw prompt directly to the image backend.
imagine_enhance = false

# Default aspect ratio for generated images. The model can override this per
# call via the aspectRatio parameter. Options: 1:1, 16:9, 9:16, 4:3, 3:4.
imagine_aspect_ratio = "1:1"
